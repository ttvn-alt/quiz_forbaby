<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Micro Quiz - ระบบทดสอบจุลชีววิทยา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f4f7f6; color: #333; }
        .correct-ans { background-color: #d4edda !important; border-color: #c3e6cb !important; color: #155724; font-weight: bold; }
        .wrong-ans { background-color: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24; text-decoration: line-through; }
        .explanation { background-color: #e8f4f8; border-left: 4px solid #3498db; padding: 12px; margin-top: 10px; border-radius: 4px; font-size: 0.95rem; color: #2c3e50; display: none; }
        input[type="radio"]:disabled { cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-blue-600 text-white p-6 text-center">
        <h1 class="text-3xl font-bold mb-2">🦠 Nursing Micro Quiz</h1>
        <p class="text-blue-100">ระบบทดสอบจุลชีววิทยา (Microbiology) สำหรับเตรียมสอบ Final</p>
    </div>

    <div id="setup-section" class="p-8">
        <div class="mb-6">
            <label class="block text-gray-700 font-bold mb-2 text-lg">📚 เลือกวิชา:</label>
            <select id="subject-select" class="w-full border-2 border-gray-200 rounded-lg p-3 text-lg focus:border-blue-500 outline-none">
                <option value="micro">Microbiology (จุลชีววิทยา)</option>
            </select>
        </div>

        <div class="mb-8">
            <label class="block text-gray-700 font-bold mb-2 text-lg">⚡ เลือกระดับความยาก (10 ข้อ):</label>
            <select id="level-select" class="w-full border-2 border-gray-200 rounded-lg p-3 text-lg focus:border-blue-500 outline-none">
                <option value="easy">🟢 ระดับง่าย (Easy - ทบทวนความจำพื้นฐาน)</option>
                <option value="medium">🟡 ระดับปานกลาง (Medium - เข้าใจกลไกและกระบวนการ)</option>
                <option value="hard">🔴 ระดับโคตรยาก (Super Hard - ประยุกต์คลินิกและเก็งข้อสอบ)</option>
            </select>
        </div>

        <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-xl transition duration-200 shadow-lg">
            เริ่มทำแบบทดสอบ 🚀
        </button>
    </div>

    <div id="quiz-section" class="hidden p-8">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 id="quiz-title" class="text-2xl font-bold text-gray-800"></h2>
            <span class="bg-gray-200 text-gray-700 px-4 py-1 rounded-full text-sm font-bold">10 ข้อ</span>
        </div>

        <div id="questions-container"></div>

        <button id="submit-btn" onclick="submitQuiz()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl text-xl transition duration-200 shadow-lg mt-8 hidden">
            ส่งคำตอบและดูผลคะแนน ✅
        </button>

        <div id="result-box" class="mt-8 text-center p-6 rounded-xl hidden"></div>
        
        <button id="restart-btn" onclick="location.reload()" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-xl text-lg transition duration-200 mt-4 hidden">
            🔄 กลับไปหน้าเริ่มต้น
        </button>
    </div>
</div>

<script>
    // ฐานข้อมูลข้อสอบ
    const quizData = {
        easy: [
            { q: "แบคทีเรียจัดเป็นเซลล์ประเภทใด?", options: ["Prokaryote", "Eukaryote", "Virus", "Prion"], ans: 0, reason: "แบคทีเรียไม่มีเยื่อหุ้มนิวเคลียส (No nuclear membrane) และไม่มีออร์แกเนลล์ที่มีเยื่อหุ้ม จึงจัดเป็น Prokaryote" },
            { q: "เชื้อรา (Fungi) จัดเป็นเซลล์ประเภทใด?", options: ["Prokaryote", "Eukaryote", "Acellular", "Archaea"], ans: 1, reason: "เชื้อราเป็นสิ่งมีชีวิตที่มีเยื่อหุ้มนิวเคลียส (True nucleus) และออร์แกเนลล์ จัดเป็น Eukaryote" },
            { q: "โครงสร้างหลักที่พบในผนังเซลล์ของแบคทีเรียคืออะไร?", options: ["Chitin", "Cellulose", "Peptidoglycan", "Beta-glucan"], ans: 2, reason: "ผนังเซลล์ของแบคทีเรีย (Cell wall) ประกอบด้วยสาร Peptidoglycan เป็นหลัก" },
            { q: "แบคทีเรียแกรมบวก (Gram positive) มีลักษณะผนังเซลล์อย่างไร?", options: ["ชั้น Peptidoglycan บาง", "ชั้น Peptidoglycan หนา", "ไม่มี Peptidoglycan", "มี Outer membrane"], ans: 1, reason: "แบคทีเรียแกรมบวกมีชั้น Peptidoglycan ที่หนามาก ทำให้ย้อมติดสีม่วง (Crystal violet)" },
            { q: "แบคทีเรียชนิดใด 'ไม่มีผนังเซลล์'?", options: ["E. coli", "Mycoplasma", "Candida", "Staphylococcus"], ans: 1, reason: "Mycoplasma เป็นแบคทีเรียกลุ่ม Atypical ที่ไม่มีผนังเซลล์ (No wall) ทำให้ยาที่ทำลายผนังเซลล์ใช้ไม่ได้ผล" },
            { q: "ผนังเซลล์ของเชื้อรา (Fungi) ประกอบด้วยสารใดเป็นหลัก?", options: ["Peptidoglycan", "Teichoic acid", "Lipid A", "Beta-1,3-D-glucan"], ans: 3, reason: "เซลล์ของเชื้อรามีผนังเซลล์ที่ประกอบด้วย Beta-1,3-D-glucan, Chitin หรือ Cellulose" },
            { q: "โครงสร้างใดของแบคทีเรียมี DNA รูปวงแหวนที่อยู่นอกโครโมโซมหลัก?", options: ["Nucleolus", "Plasmid", "Ribosome", "Mitochondria"], ans: 1, reason: "Plasmid คือ Extrachromosomal DNA รูปวงแหวนของแบคทีเรีย ซึ่งมักมียีนดื้อยาอยู่" },
            { q: "กระบวนการแบ่งเซลล์ของแบคทีเรียเรียกว่าอะไร?", options: ["Mitosis", "Meiosis", "Binary fission", "Budding"], ans: 2, reason: "แบคทีเรียเพิ่มจำนวนโดยการแบ่งเซลล์แบบ Binary fission" },
            { q: "วิธีใดมีประสิทธิภาพที่สุดในการกำจัด 'สปอร์' ของเชื้อบนมือ?", options: ["เช็ดด้วยแอลกอฮอล์ 70%", "ล้างมือด้วยสบู่ให้นานพอ", "เช็ดด้วยน้ำเกลือ", "สเปรย์น้ำร้อน"], ans: 1, reason: "สปอร์ทนทานต่อแอลกอฮอล์ ต้องใช้วิธีล้างมือด้วยสบู่ (Handwashing) ให้นานเพียงพอเพื่อให้สปอร์หลุดออกไป" },
            { q: "ปัจจุบันมีวัคซีนที่ใช้ป้องกัน 'เชื้อรา' (Fungi) หรือไม่?", options: ["มีเฉพาะเชื้อราทางผิวหนัง", "มีครบทุกชนิด", "ยังไม่มีวัคซีนสำหรับเชื้อรา", "มีเฉพาะในเด็ก"], ans: 2, reason: "ปัจจุบันมีวัคซีนป้องกันแบคทีเรียบางชนิด แต่ยังไม่มีวัคซีนสำหรับเชื้อรา (Eukaryotes) เลย" }
        ],
        medium: [
            { q: "ส่วนใดของ Lipopolysaccharide (LPS) ในแบคทีเรียแกรมลบที่ทำหน้าที่เป็นสารพิษ Endotoxin?", options: ["O-antigen", "Core polysaccharide", "Lipid A", "Teichoic acid"], ans: 2, reason: "Lipid A เป็นส่วนประกอบของ LPS ที่ทำหน้าที่เป็น Endotoxin กระตุ้นภูมิคุ้มกันให้เกิดไข้หรือช็อกได้" },
            { q: "ยาต้านเชื้อรากลุ่ม Echinocandins ออกฤทธิ์ยับยั้งเป้าหมายใด?", options: ["ไรโบโซม 30S", "เอนไซม์ 1,3-beta-D-glucan synthase", "DNA polymerase", "การสร้างโปรตีน"], ans: 1, reason: "ยา Echinocandins ยับยั้งเอนไซม์ 1,3-beta-D-glucan synthase ทำให้เชื้อราสร้างผนังเซลล์ไม่ได้และเซลล์แตกตาย" },
            { q: "mRNA ของแบคทีเรียมีลักษณะเฉพาะตามข้อใด?", options: ["เป็นแบบ Monocistronic", "ต้องมีการตัดแต่ง (Splicing) ก่อนแปลรหัส", "เป็นแบบ Polycistronic (1 mRNA ถอดรหัสได้หลายยีน)", "มีอายุการใช้งานนานมาก"], ans: 2, reason: "แบคทีเรียมี mRNA แบบ Polycistronic คือสร้างเส้นเดียวแต่มีข้อมูลของโปรตีนหลายชนิด และไม่มีการทำ mRNA processing" },
            { q: "โครงสร้างใดที่พบในผนังเซลล์แบคทีเรียแกรมบวกและมีประจุลบ?", options: ["Outer membrane", "Teichoic acid", "Porin", "Lipoprotein"], ans: 1, reason: "Teichoic acid พบเฉพาะในแกรมบวก เป็นประจุลบช่วยดึงดูดไอออนและควบคุมเอนไซม์ Autolysin" },
            { q: "ทำไมยาปฏิชีวนะกลุ่ม Broad-spectrum จึงสามารถผ่าน Outer membrane ของแบคทีเรียแกรมลบได้ดีกว่า?", options: ["เพราะยามีคุณสมบัติชอบไขมัน (Hydrophobic)", "เพราะยาทำลาย Lipid A", "เพราะยามีคุณสมบัติชอบน้ำ (Hydrophilic) และผ่านรู Porin ได้", "เพราะยามีขนาดใหญ่"], ans: 2, reason: "ยา Broad-spectrum มักเป็น Hydrophilic และมีขนาดพอเหมาะที่จะลอดผ่านรู (Pore/Porin) บน Outer membrane ของแกรมลบได้" },
            { q: "การจำลอง DNA (Replication) ของแบคทีเรีย แตกต่างจากเชื้อราในข้อใด?", options: ["แบคทีเรียมีจุดเริ่มต้นหลายจุด", "แบคทีเรียมีจุดเริ่มต้น (origin) เพียง 1 จุด", "เชื้อราจำลองได้เร็วกว่า", "เชื้อราไม่มี origin"], ans: 1, reason: "แบคทีเรียมี DNA แบบวงแหวนและมี Origin of replication เพียง 1 จุด (เชื้อรามีหลายจุด)" },
            { q: "กระบวนการ Transcription (ถอดรหัส) ของเชื้อราเกิดขึ้นที่บริเวณใด?", options: ["ไซโทพลาซึม", "นิวเคลียส", "ผนังเซลล์", "ไรโบโซม"], ans: 1, reason: "เชื้อราเป็น Eukaryote มีนิวเคลียส กระบวนการ Transcription จึงเกิดขึ้นภายในนิวเคลียส (ต่างจากแบคทีเรียที่เกิดในไซโทพลาซึม)" },
            { q: "หากต้องการทราบผลการติดเชื้อภายในเวลา 'ไม่กี่ชั่วโมง' ควรใช้วิธีใด?", options: ["ตรวจหาระดับ Antibody", "เพาะเชื้อบนอาหารแข็ง (Culture)", "ตรวจหาสารพันธุกรรม (Nucleic acid / PCR)", "ตรวจหา Cytokine"], ans: 2, reason: "PCR (Nucleic acid detection) สามารถทราบผลได้ในเวลาเป็นชั่วโมง ขณะที่ Culture หรือรอ Antibody ต้องใช้เวลาเป็นวัน" },
            { q: "การรายงานผลเพาะเชื้อจากสิ่งส่งตรวจบน Agar plate นับจำนวนในหน่วยใด?", options: ["PFU", "CFU (Colony forming unit)", "Cells/ml", "OD"], ans: 1, reason: "โคโลนีของแบคทีเรียที่เจริญบนอาหารแข็ง จะถูกนับเป็นหน่วย CFU" },
            { q: "แบคทีเรีย Mycoplasma pneumoniae ทำให้เกิดโรคใดและมีลักษณะพิเศษอย่างไร?", options: ["โรคปอดบวมเดินได้ (Walking pneumonia) และไม่มีผนังเซลล์", "โรควัณโรค และมีผนังเซลล์หนา", "โรคติดเชื้อในกระแสเลือด และมี LPS", "โรคอาหารเป็นพิษ และมีสปอร์"], ans: 0, reason: "Mycoplasma ก่อโรค Walking pneumonia และลักษณะสำคัญคือ ไม่มีผนังเซลล์ (No cell wall) จึงไม่ติดสีแกรม" }
        ],
        hard: [
            { q: "ผู้ป่วยติดเชื้อแกรมลบในกระแสเลือด (Septicemia) และเกิดภาวะช็อก อาการนี้เกี่ยวข้องกับกลไกใดของเชื้อโดยตรง?", options: ["เชื้อปล่อย Exotoxin ไปทำลายเซลล์เม็ดเลือดแดง", "Lipid A จาก LPS กระตุ้นระบบภูมิคุ้มกัน (Cytokine storm) อย่างรุนแรงเมื่อเซลล์แตก", "Teichoic acid ทำปฏิกิริยากับผนังหลอดเลือด", "เชื้อสร้างสปอร์อุดตันหลอดเลือด"], ans: 1, reason: "โครงสร้าง Lipid A (Endotoxin) ของแบคทีเรียแกรมลบ เมื่อเชื้อตายหรือแบ่งตัวจะถูกปล่อยออกมา กระตุ้นภูมิคุ้มกันจนเกิดภาวะ Septic shock" },
            { q: "แพทย์จ่ายยา Penicillin ให้ผู้ป่วยที่ติดเชื้อ Mycoplasma ผลการรักษาจะเป็นอย่างไร?", options: ["หายเร็วขึ้นเพราะยาทำลายผนังเซลล์", "อาการแย่ลงเพราะยากระตุ้นสปอร์", "ไม่ได้ผล เพราะ Mycoplasma ไม่มี Peptidoglycan ที่เป็นเป้าหมายของยา", "ได้ผลดีเพราะยามุ่งเป้าที่โปรตีนภายใน"], ans: 2, reason: "ยา Penicillin จัดอยู่ในกลุ่ม Beta-lactam ที่ออกฤทธิ์ทำลายผนังเซลล์ แต่ Mycoplasma ไม่มีผนังเซลล์ ยาจึงไม่มีเป้าหมายให้ออกฤทธิ์" },
            { q: "ในขั้นตอนการย้อมสีแกรม การใช้แอลกอฮอล์ (Alcohol) มีผลต่อแบคทีเรียแกรมลบอย่างไร?", options: ["ละลายชั้น Lipid (LPS) ทำให้สี Crystal violet หลุดออกจากชั้น Peptidoglycan ที่บาง", "ทำให้ชั้น Peptidoglycan หดตัวและกักเก็บสีไว้", "เปลี่ยนสี Crystal violet เป็นสีแดง", "ทำลายเยื่อหุ้มนิวเคลียส"], ans: 0, reason: "แอลกอฮอล์ทำหน้าที่เป็น Decolorizer ละลายชั้นไขมัน (Outer membrane) ของแกรมลบ สีม่วงจึงหลุดออก ทำให้ติดสีแดง Safranin ในตอนท้าย" },
            { q: "เหตุใดแบคทีเรียจึงมี Mutation rate (อัตรากลายพันธุ์) 'ต่อรอบการจำลอง DNA' ต่ำกว่า แม้ว่าแบคทีเรียจะดื้อยาได้เร็ว?", options: ["แบคทีเรียมีการ Splicing แก้ไขยีน", "เอนไซม์ DNA polymerase ของแบคทีเรียมีความสามารถในการตรวจทาน (Proofreading) ที่ดีกว่า", "แบคทีเรียใช้เวลาแบ่งเซลล์นานมาก", "แบคทีเรียไม่มีเอนไซม์ RNA polymerase"], ans: 1, reason: "DNA polymerase ของแบคทีเรียมี Proofreading ที่ดีกว่าทำให้อัตรากลายพันธุ์ต่อรอบต่ำ แต่ที่ดื้อยาเร็วเพราะมันแบ่งตัวแบบก้าวกระโดด (Fast generation time)" },
            { q: "กลไกใดที่ทำให้แบคทีเรียสามารถสร้างโปรตีนตอบสนองต่อสภาพแวดล้อมได้รวดเร็วกว่าเชื้อรา?", options: ["เพราะกระบวนการ Transcription และ Translation เกิดขึ้นพร้อมกันในไซโทพลาซึม", "เพราะ mRNA ของแบคทีเรียมีอายุยาวนาน (Long-lived)", "เพราะมีการสร้าง mRNA ในนิวเคลียสและส่งออกอย่างรวดเร็ว", "เพราะมีการเติม 5' cap ป้องกันการทำลาย"], ans: 0, reason: "แบคทีเรียไม่มีนิวเคลียส (Prokaryote) กระบวนการถอดรหัสและแปลรหัสจึงสามารถเกิดไปพร้อมๆ กันได้ (Coupled transcription/translation) ทำให้ตอบสนองได้ไวมาก" },
            { q: "ยาปฏิชีวนะที่ยับยั้งการสร้างโปรตีนของแบคทีเรีย มักจะมุ่งเป้าไปที่โครงสร้างใดที่แตกต่างจากเซลล์มนุษย์?", options: ["ไรโบโซม 80S", "เอนไซม์ 1,3-beta-D-glucan synthase", "ไรโบโซมหน่วยย่อย 30S และ 50S", "DNA gyrase"], ans: 2, reason: "แบคทีเรียมีไรโบโซมขนาด 70S (ประกอบจาก 30S และ 50S) ซึ่งต่างจากเซลล์มนุษย์ที่เป็น 80S ยาจึงไม่ทำลายเซลล์ร่างกายเรา" },
            { q: "การตรวจหา Antibody (Serological test) มักให้ผลลบลวง (False negative) หากเจาะเลือดตรวจในวันแรกที่มีอาการไข้ เพราะเหตุใด?", options: ["Antibody ถูกทำลายด้วยความร้อนของไข้", "ร่างกายของ Host ต้องใช้เวลา 7-14 วัน ในการสร้างภูมิคุ้มกัน (Antibody) ขึ้นมาในระดับที่ตรวจพบได้", "เชื้อแบคทีเรียทำลาย Antibody ทันที", "Antibody ไปจับกับยาปฏิชีวนะแทน"], ans: 1, reason: "การตรวจทางภูมิคุ้มกันวิทยา (Serology) มีข้อจำกัดคือต้องรอ Window period 7-14 วัน เพื่อให้ร่างกายสร้าง Antibody" },
            { q: "ความแตกต่างในการเลือกใช้ยา Broad-spectrum กับ Narrow-spectrum ต่อแบคทีเรียแกรมลบคืออะไร?", options: ["Narrow-spectrum ทำลาย Lipid A ได้ดีกว่า", "Narrow-spectrum มักมีลักษณะ Hydrophobic ยาจึงผ่านเข้า Outer membrane ของแกรมลบไม่ได้", "Broad-spectrum มีขนาดใหญ่และทำลายเซลล์เมมเบรนโดยตรง", "ทั้งสองกลุ่มยับยั้งไรโบโซมได้เท่ากัน"], ans: 1, reason: "ยา Narrow-spectrum มักมีขนาดเทอะทะและเป็น Hydrophobic (ไม่ชอบน้ำ) จึงลอดผ่านช่อง Porin ของ Outer membrane ของแบคทีเรียแกรมลบไม่ได้" },

    };

    let currentQuestions = [];
    let userAnswers = [];

    function startQuiz() {
        const level = document.getElementById('level-select').value;
        currentQuestions = quizData[level];
        userAnswers = new Array(currentQuestions.length).fill(null);

        const levelText = document.getElementById('level-select').options[document.getElementById('level-select').selectedIndex].text;
        document.getElementById('quiz-title').innerText = levelText;

        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        document.getElementById('submit-btn').classList.remove('hidden');

        renderQuestions();
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        currentQuestions.forEach((qObj, qIndex) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'bg-gray-50 p-6 rounded-xl mb-6 border-l-4 border-blue-400 shadow-sm';
            
            let optionsHTML = '';
            qObj.options.forEach((opt, oIndex) => {
                optionsHTML += `
                    <label id="label-q${qIndex}-o${oIndex}" class="block p-4 mb-3 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-blue-50 transition duration-150">
                        <input type="radio" name="q${qIndex}" value="${oIndex}" class="mr-3 transform scale-125 accent-blue-600" onchange="selectAnswer(${qIndex}, ${oIndex})">
                        <span class="text-lg text-gray-700">${opt}</span>
                    </label>
                `;
            });

            qDiv.innerHTML = `
                <h3 class="text-xl font-bold mb-4 text-gray-800"><span class="text-blue-600">ข้อ ${qIndex + 1}:</span> ${qObj.q}</h3>
                <div class="options-container">${optionsHTML}</div>
                <div id="expl-q${qIndex}" class="explanation">
                    <strong class="text-blue-700">💡 คำอธิบาย:</strong> ${qObj.reason}
                </div>
            `;
            container.appendChild(qDiv);
        });
    }

    function selectAnswer(qIndex, oIndex) {
        userAnswers[qIndex] = oIndex;
    }

    function submitQuiz() {
        if (userAnswers.includes(null)) {
            alert("กรุณาตอบคำถามให้ครบทุกข้อก่อนส่งคำตอบครับ 🚨");
            return;
        }

        let score = 0;

        currentQuestions.forEach((qObj, qIndex) => {
            const selected = userAnswers[qIndex];
            const correct = qObj.ans;

            // ล็อกตัวเลือกทั้งหมด
            const radios = document.getElementsByName(`q${qIndex}`);
            radios.forEach(radio => radio.disabled = true);

            // ไฮไลต์สี
            if (selected === correct) {
                score++;
                document.getElementById(`label-q${qIndex}-o${selected}`).classList.add('correct-ans');
            } else {
                document.getElementById(`label-q${qIndex}-o${selected}`).classList.add('wrong-ans');
                document.getElementById(`label-q${qIndex}-o${correct}`).classList.add('correct-ans');
            }

            // แสดงคำอธิบาย
            document.getElementById(`expl-q${qIndex}`).style.display = 'block';
        });

        document.getElementById('submit-btn').classList.add('hidden');
        
        const resultBox = document.getElementById('result-box');
        resultBox.classList.remove('hidden');
        document.getElementById('restart-btn').classList.remove('hidden');

        let msg = "";
        let bgColor = "";
        if (score >= 8) {
            msg = "🏆 ยอดเยี่ยมมาก! ความรู้แม่นยำ พร้อมลุยข้อสอบ Final แล้ว";
            bgColor = "bg-green-100 border-2 border-green-400 text-green-800";
        } else if (score >= 5) {
            msg = "👍 ทำได้ดีครับ! แต่ลองอ่านคำอธิบายในข้อที่ผิดเพื่อเสริมความเข้าใจนะ";
            bgColor = "bg-yellow-100 border-2 border-yellow-400 text-yellow-800";
        } else {
            msg = "📚 ไม่เป็นไรครับ! แนวข้อสอบนี้ค่อนข้างลึก ลองอ่านคำเฉลยรับรองว่าทำได้แน่นอน";
            bgColor = "bg-red-100 border-2 border-red-400 text-red-800";
        }

        resultBox.className = `mt-8 text-center p-6 rounded-xl text-xl font-bold ${bgColor}`;
        resultBox.innerHTML = `คุณทำคะแนนได้: ${score} / 10<br><span class="text-base font-normal mt-2 block">${msg}</span>`;
        
        // เลื่อนหน้าจอขึ้นไปดูผล
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
