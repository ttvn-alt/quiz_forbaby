<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Micro Quiz - ระบบทดสอบจุลชีววิทยา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f4f7f6; color: #333; }
        .correct-ans { background-color: #d4edda !important; border-color: #c3e6cb !important; color: #155724; font-weight: bold; }
        .wrong-ans { background-color: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24; text-decoration: line-through; }
        .explanation { background-color: #e8f4f8; border-left: 4px solid #3498db; padding: 12px; margin-top: 10px; border-radius: 4px; font-size: 0.95rem; color: #2c3e50; display: none; line-height: 1.6; }
        input[type="radio"]:disabled { cursor: not-allowed; }
        
        /* Animation สำหรับปุ่ม */
        .btn-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-blue-600 text-white p-6 text-center">
        <h1 class="text-3xl font-bold mb-2">🦠 Nursing Micro Quiz</h1>
        <p class="text-blue-100">ระบบทดสอบจุลชีววิทยา (Microbiology) สำหรับเตรียมสอบ Final</p>
    </div>

    <div id="setup-section" class="p-8">
        <div class="mb-6">
            <label class="block text-gray-700 font-bold mb-2 text-lg">📚 เลือกวิชา:</label>
            <select id="subject-select" class="w-full border-2 border-gray-200 rounded-lg p-3 text-lg focus:border-blue-500 outline-none">
                <option value="micro">Microbiology (จุลชีววิทยาประยุกต์คลินิก)</option>
            </select>
        </div>

        <div class="mb-8">
            <label class="block text-gray-700 font-bold mb-2 text-lg">⚡ เลือกระดับความยาก (ระดับละ 10 ข้อ):</label>
            <select id="level-select" class="w-full border-2 border-gray-200 rounded-lg p-3 text-lg focus:border-blue-500 outline-none">
                <option value="easy">🟢 ระดับง่าย (Easy - ทบทวนความจำพื้นฐาน)</option>
                <option value="medium">🟡 ระดับปานกลาง (Medium - เข้าใจกลไกและกระบวนการ)</option>
                <option value="hard">🔴 ระดับยาก (Hard - ประยุกต์คลินิกเบื้องต้น)</option>
                <option value="expert" class="font-bold text-red-600">🔥 ระดับปรมาจารย์ (Expert - พยาบาลเฉพาะทาง / โคตรยาก!)</option>
            </select>
        </div>

        <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-xl btn-hover shadow-lg">
            เริ่มทำแบบทดสอบ 🚀
        </button>
    </div>

    <div id="quiz-section" class="hidden p-8">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 id="quiz-title" class="text-2xl font-bold text-gray-800"></h2>
            <span class="bg-gray-200 text-gray-700 px-4 py-1 rounded-full text-sm font-bold">10 ข้อ</span>
        </div>

        <div id="questions-container"></div>

        <button id="submit-btn" onclick="submitQuiz()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl text-xl btn-hover shadow-lg mt-8 hidden">
            ส่งคำตอบและดูผลคะแนน ✅
        </button>

        <div id="result-box" class="mt-8 text-center p-6 rounded-xl hidden"></div>
        
        <button id="restart-btn" onclick="location.reload()" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-xl text-lg btn-hover mt-4 hidden">
            🔄 เลือกทดสอบระดับอื่น
        </button>
    </div>
</div>

<script>
    // ฐานข้อมูลข้อสอบ (เพิ่มระดับ Expert แล้ว)
    const quizData = {
        easy: [
            { q: "แบคทีเรียจัดเป็นเซลล์ประเภทใด?", options: ["Prokaryote", "Eukaryote", "Virus", "Prion"], ans: 0, reason: "แบคทีเรียไม่มีเยื่อหุ้มนิวเคลียส (No nuclear membrane) และไม่มีออร์แกเนลล์ที่มีเยื่อหุ้ม จึงจัดเป็น Prokaryote [cite: 14]" },
            { q: "เชื้อรา (Fungi) จัดเป็นเซลล์ประเภทใด?", options: ["Prokaryote", "Eukaryote", "Acellular", "Archaea"], ans: 1, reason: "เชื้อราเป็นสิ่งมีชีวิตที่มีเยื่อหุ้มนิวเคลียสและออร์แกเนลล์ จัดเป็น Eukaryote [cite: 18]" },
            { q: "โครงสร้างหลักที่พบในผนังเซลล์ของแบคทีเรียคืออะไร?", options: ["Chitin", "Cellulose", "Peptidoglycan", "Beta-glucan"], ans: 2, reason: "ผนังเซลล์ของแบคทีเรีย (Cell wall) ประกอบด้วยสาร Peptidoglycan เป็นหลัก [cite: 6]" },
            { q: "แบคทีเรียแกรมบวก (Gram positive) มีลักษณะผนังเซลล์อย่างไร?", options: ["ชั้น Peptidoglycan บาง", "ชั้น Peptidoglycan หนา", "ไม่มี Peptidoglycan", "มี Outer membrane"], ans: 1, reason: "แบคทีเรียแกรมบวกมีชั้น Peptidoglycan ที่หนามาก (Thick peptidoglycan) [cite: 6]" },
            { q: "แบคทีเรียชนิดใด 'ไม่มีผนังเซลล์'?", options: ["E. coli", "Mycoplasma", "Candida", "Staphylococcus"], ans: 1, reason: "Mycoplasma เป็นแบคทีเรียกลุ่ม Atypical ที่ไม่มีผนังเซลล์ (No wall) ทำให้รูปร่างไม่แน่นอน [cite: 33]" },
            { q: "ผนังเซลล์ของเชื้อรา (Fungi) ประกอบด้วยสารใดเป็นหลัก?", options: ["Peptidoglycan", "Teichoic acid", "Lipid A", "Beta-1,3-D-glucan"], ans: 3, reason: "เซลล์ของเชื้อรามีผนังเซลล์ที่ประกอบด้วย Beta-1,3-D-glucan ซึ่งเป็นเป้าหมายของยาต้านเชื้อรา [cite: 83]" },
            { q: "โครงสร้างใดของแบคทีเรียมี DNA รูปวงแหวนที่อยู่นอกโครโมโซมหลัก?", options: ["Nucleolus", "Plasmid", "Ribosome", "Mitochondria"], ans: 1, reason: "Plasmid คือ Circular DNA ที่อยู่นอกโครโมโซมของแบคทีเรีย [cite: 13]" },
            { q: "การจำลอง DNA ของแบคทีเรียเกิดจากจุดเริ่มต้น (Origin) กี่จุด?", options: ["1 จุด", "2 จุด", "หลายจุด (Multiple)", "ไม่มีจุดเริ่มต้น"], ans: 0, reason: "แบคทีเรียมีจุดเริ่มต้นการจำลอง DNA เพียง 1 จุด (Origin of replication) ผิดกับเชื้อราที่มีหลายจุด [cite: 88, 90]" },
            { q: "วิธีใดมีประสิทธิภาพที่สุดในการกำจัด 'สปอร์' ของเชื้อบนมือ?", options: ["เช็ดด้วยแอลกอฮอล์ 70%", "ล้างมือด้วยสบู่ให้นานพอ", "เช็ดด้วยน้ำเกลือ", "สเปรย์น้ำร้อน"], ans: 1, reason: "สปอร์ทนทานต่อแอลกอฮอล์ (Alcohol not work) ต้องใช้วิธีล้างมือด้วยสบู่ให้นานเพียงพอ [cite: 118]" },
            { q: "ปัจจุบันมีวัคซีนที่ใช้ป้องกัน 'เชื้อรา' (Fungi) หรือไม่?", options: ["มีเฉพาะเชื้อราทางผิวหนัง", "มีครบทุกชนิด", "ยังไม่มีวัคซีนสำหรับเชื้อรา", "มีเฉพาะในเด็ก"], ans: 2, reason: "ปัจจุบันมีวัคซีนป้องกันแบคทีเรียบางชนิด แต่ยังไม่มีวัคซีนสำหรับเชื้อรา (No vaccine yet for fungi) [cite: 119]" }
        ],
        medium: [
            { q: "ส่วนใดของ Lipopolysaccharide (LPS) ในแบคทีเรียแกรมลบที่ทำหน้าที่เป็นสารพิษ Endotoxin?", options: ["O-antigen", "Core polysaccharide", "Lipid A", "Teichoic acid"], ans: 2, reason: "Lipid A เป็นส่วนประกอบของ LPS ที่ทำหน้าที่เป็น Endotoxin กระตุ้นภูมิคุ้มกันรุนแรงในกระแสเลือด [cite: 29]" },
            { q: "ยาต้านเชื้อรากลุ่ม Echinocandins ออกฤทธิ์ยับยั้งเป้าหมายใด?", options: ["ไรโบโซม 30S", "เอนไซม์ 1,3-beta-D-glucan synthase", "DNA polymerase", "การสร้างโปรตีน"], ans: 1, reason: "ยา Echinocandins ยับยั้งเอนไซม์ 1,3-beta-D-glucan synthase ทำให้เชื้อราสร้างผนังเซลล์ไม่ได้ [cite: 83]" },
            { q: "mRNA ของแบคทีเรียมีลักษณะเฉพาะตามข้อใด?", options: ["เป็นแบบ Monocistronic", "ต้องมีการตัดแต่ง (Splicing) ก่อนแปลรหัส", "เป็นแบบ Polycistronic", "มีอายุการใช้งานนานมาก"], ans: 2, reason: "แบคทีเรียมี mRNA แบบ Polycistronic และไม่มีการทำ mRNA processing (ตัดแต่งยีน) [cite: 99]" },
            { q: "โครงสร้างใดที่พบในผนังเซลล์แบคทีเรียแกรมบวกและมีประจุลบ?", options: ["Outer membrane", "Teichoic acid", "Porin", "Lipoprotein"], ans: 1, reason: "Teichoic acid พบเฉพาะในแกรมบวก เป็นสารประจุลบที่ช่วยควบคุมการทำงานของเอนไซม์ Autolysin [cite: 63, 65]" },
            { q: "ทำไมยาปฏิชีวนะกลุ่ม Broad-spectrum จึงสามารถผ่าน Outer membrane ของแบคทีเรียแกรมลบได้ดีกว่า Narrow-spectrum?", options: ["เพราะยามีคุณสมบัติชอบไขมัน (Hydrophobic)", "เพราะยาทำลาย Lipid A", "เพราะยามีคุณสมบัติชอบน้ำ (Hydrophilic) และมีขนาดพอผ่านรู Porin ได้", "เพราะยามีขนาดใหญ่กว่ารู Porin"], ans: 2, reason: "ยา Broad-spectrum มักเป็น Hydrophilic และสามารถลอดผ่านรู (Pore) บน Outer membrane ของแกรมลบได้ [cite: 25]" },
            { q: "การถอดรหัส (Transcription) ของเชื้อราเกิดขึ้นที่บริเวณใด?", options: ["ไซโทพลาซึม", "นิวเคลียส", "ผนังเซลล์", "ไรโบโซม"], ans: 1, reason: "เชื้อราเป็น Eukaryote มีนิวเคลียสที่แท้จริง กระบวนการ Transcription จึงเกิดขึ้นภายในนิวเคลียส (Nucleus) [cite: 100]" },
            { q: "หากต้องการทราบผลการติดเชื้อภายในเวลา 'ไม่กี่ชั่วโมง' ควรใช้วิธีใด?", options: ["ตรวจหาระดับ Antibody", "เพาะเชื้อบนอาหารแข็ง (Culture)", "ตรวจหาสารพันธุกรรม (Nucleic acid / PCR)", "ตรวจหา Cytokine"], ans: 2, reason: "PCR (Nucleic acid detection) สามารถทราบผลได้ภายในไม่กี่ชั่วโมง (Within hours after infection) [cite: 111]" },
            { q: "การรายงานผลเพาะเชื้อจากสิ่งส่งตรวจบน Agar plate นับจำนวนในหน่วยใด?", options: ["PFU", "CFU (Colony forming unit)", "Cells/ml", "OD"], ans: 1, reason: "โคโลนีของแบคทีเรียที่เจริญบนอาหารแข็ง จะถูกนับเป็นหน่วย CFU (Colony forming unit) [cite: 115]" },
            { q: "แบคทีเรีย Mycoplasma pneumoniae ทำให้เกิดโรคใดและมีลักษณะพิเศษอย่างไร?", options: ["โรคปอดบวมเดินได้ (Walking pneumonia) และไม่มีผนังเซลล์", "โรควัณโรค และมีผนังเซลล์หนา", "โรคติดเชื้อในกระแสเลือด และมี LPS", "โรคอาหารเป็นพิษ และมีสปอร์"], ans: 0, reason: "Mycoplasma ก่อโรค Walking pneumonia และลักษณะสำคัญคือ ไม่มีผนังเซลล์ (No wall) จึงไม่ตอบสนองต่อยาที่เป้าหมายคือผนังเซลล์ [cite: 33, 38]" },
            { q: "ในกระบวนการจำลอง DNA เอนไซม์ของสิ่งมีชีวิตใดมีประสิทธิภาพการตรวจทาน (Proofreading) ดีกว่ากัน?", options: ["เชื้อรา", "ไวรัส", "แบคทีเรีย", "พรีออน"], ans: 2, reason: "แบคทีเรียมีอัตราการกลายพันธุ์ต่อรอบต่ำกว่าเพราะมีประสิทธิภาพการตรวจทาน (Proofreading ability) ของ DNA polymerase ที่ดีกว่า [cite: 91]" }
        ],
        hard: [
            { q: "ผู้ป่วยติดเชื้อแกรมลบในกระแสเลือด และเกิดภาวะช็อก อาการนี้เกี่ยวข้องกับกลไกใดของเชื้อโดยตรง?", options: ["เชื้อปล่อย Exotoxin ไปทำลายเซลล์เม็ดเลือดแดง", "Lipid A จาก LPS กระตุ้นระบบภูมิคุ้มกันอย่างรุนแรงเมื่อเซลล์แตก", "Teichoic acid ทำปฏิกิริยากับผนังหลอดเลือด", "เชื้อสร้างสปอร์อุดตันหลอดเลือด"], ans: 1, reason: "โครงสร้าง Lipid A ซึ่งเป็น Endotoxin ของแบคทีเรียแกรมลบ เมื่อเข้าสู่กระแสเลือดจะกระตุ้นภูมิคุ้มกันจนเกิดภาวะ Septic shock [cite: 29]" },
            { q: "แพทย์จ่ายยา Penicillin ให้ผู้ป่วยติดเชื้อ Mycoplasma ผลการรักษาจะเป็นอย่างไร?", options: ["หายเร็วขึ้นเพราะยาทำลายผนังเซลล์", "อาการแย่ลงเพราะยากระตุ้นสปอร์", "ไม่ได้ผล เพราะ Mycoplasma ไม่มี Peptidoglycan ที่เป็นเป้าหมายของยา", "ได้ผลดีเพราะยามุ่งเป้าที่โปรตีนภายใน"], ans: 2, reason: "ยา Beta-lactam ออกฤทธิ์ทำลายผนังเซลล์ (Peptidoglycan targeted) แต่ Mycoplasma ไม่มีผนังเซลล์ ยาจึงไม่มีผล [cite: 36]" },
            { q: "ในขั้นตอนการย้อมสีแกรม การใช้แอลกอฮอล์ (Alcohol) มีผลต่อแบคทีเรียแกรมลบอย่างไร?", options: ["ละลายชั้น Lipid (LPS) และล้างสีออก", "ทำให้ชั้น Peptidoglycan หดตัวและกักเก็บสีไว้", "เปลี่ยนสี Crystal violet เป็นสีแดง", "ทำลายเยื่อหุ้มนิวเคลียส"], ans: 0, reason: "แอลกอฮอล์ทำหน้าที่เป็นตัวทำละลายไขมัน ไปละลายชั้น LPS (Outer membrane) ของแกรมลบ สีม่วงจึงหลุดออก [cite: 29]" },
            { q: "เหตุใดแบคทีเรียจึงมี Mutation rate 'ต่อรอบการจำลอง DNA' ต่ำกว่า แต่กลับดื้อยาและกลายพันธุ์รวมเร็วกว่าเชื้อรา?", options: ["เพราะมีการ Splicing แก้ไขยีน", "เอนไซม์ DNA polymerase ของแบคทีเรียตรวจทาน (Proofreading) ดีกว่า แต่มันแบ่งเซลล์ได้เร็วกว่ามาก ทำให้เกิดรอบการจำลองสะสมสูงกว่า", "เพราะใช้เวลาแบ่งเซลล์นานมาก", "แบคทีเรียไม่มี DNA polymerase"], ans: 1, reason: "DNA polymerase ของแบคทีเรียมี Proofreading ที่ดีกว่า แต่ที่กลายพันธุ์และดื้อยาสะสมเร็วเพราะมันแบ่งตัวรวดเร็วมาก (grow much faster) [cite: 91]" },
            { q: "กลไกใดที่ทำให้แบคทีเรียสร้างโปรตีนตอบสนองต่อสภาพแวดล้อมได้รวดเร็วกว่าเชื้อรา?", options: ["Transcription และ Translation เกิดขึ้นพร้อมกัน (Coupled) โดยไม่มีเยื่อหุ้มนิวเคลียสกั้น", "mRNA ของแบคทีเรียมีอายุยาวนาน", "มีการสร้าง mRNA ในนิวเคลียสและส่งออกรวดเร็ว", "มีการเติม 5' cap ป้องกันการทำลาย"], ans: 0, reason: "กระบวนการถอดรหัสและแปลรหัสของแบคทีเรียเกิดขึ้นต่อเนื่องกันทันที (Fast and efficiency - coupled translation) เพราะไม่มีนิวเคลียส [cite: 99]" },
            { q: "การตรวจหา Antibody มักให้ผลลบลวง (False negative) หากเจาะเลือดตรวจในวันแรกที่มีอาการไข้ เพราะเหตุใด?", options: ["Antibody ถูกทำลายด้วยไข้", "ร่างกายของต้องใช้เวลา 7-14 วัน ในการสร้าง Antibody ขึ้นมาในระดับที่ตรวจพบได้", "แบคทีเรียทำลาย Antibody ทันที", "Antibody จับกับยารักษา"], ans: 1, reason: "การตรวจหาโปรตีนภูมิคุ้มกัน (Serological test) ต้องใช้เวลารอให้ร่างกายสร้างการตอบสนองประมาณ 7-14 วันหลังการติดเชื้อ [cite: 112]" },

            { q: "แบคทีเรียกลุ่ม Archaebacteria มีความสำคัญทางการแพทย์ในลักษณะใด?", options: ["เป็นสาเหตุหลักของการติดเชื้อในโรงพยาบาล", "ไม่มี Peptidoglycan แต่มีโปรตีนผสมโพลีแซคคาไรด์ ดื้อยาหลายชนิด แต่เป็นแค่เชื้อประจำถิ่น (Normal flora) ไม่ก่อโรค", "ก่อโรค Septic shock รุนแรง", "ถูกทำลายง่ายด้วย Penicillin"], ans: 1, reason: "Archaebacteria ดื้อต่อยาหลายตัวเพราะไม่มี Peptidoglycan (No peptidoglycan) แต่โชคดีที่ไม่ก่อโรค เป็นแค่ Normal flora (No pathogens but only normal flora) [cite: 40, 43]" },

            { q: "ความแตกต่างทางพันธุศาสตร์ที่ชัดเจนของ 'mRNA ในเชื้อรา (Fungi)' เมื่อเปรียบเทียบกับแบคทีเรีย คือข้อใด?", options: ["mRNA เชื้อรามีกระบวนการตัดแต่ง (Splicing of introns) และเป็นแบบ 1 เส้น 1 ยีน (Monocistronic)", "mRNA เชื้อราถูกสร้างในไซโทพลาซึม", "mRNA เชื้อราไม่ต้องการการเติม PolyA tail", "mRNA เชื้อรามีอายุการใช้งานที่สั้นมาก (Short-lived)"], ans: 0, reason: "เชื้อราเป็น Eukaryote จึงมี mRNA แบบ Monocistronic และต้องผ่านกระบวนการ Splicing เพื่อตัด Introns รวมถึงมีการเติม Cap และ PolyA tail (ซึ่งแบคทีเรียไม่มี) [cite: 100]" },

    let currentQuestions = [];
    let userAnswers = [];

    function startQuiz() {
        const level = document.getElementById('level-select').value;
        currentQuestions = quizData[level];
        userAnswers = new Array(currentQuestions.length).fill(null);

        const levelText = document.getElementById('level-select').options[document.getElementById('level-select').selectedIndex].text;
        document.getElementById('quiz-title').innerHTML = `<span class="${level === 'expert' ? 'text-red-600' : 'text-gray-800'}">${levelText}</span>`;

        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        document.getElementById('submit-btn').classList.remove('hidden');

        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        currentQuestions.forEach((qObj, qIndex) => {
            const qDiv = document.createElement('div');
            // ไฮไลต์กล่องข้อสอบถ้าเป็นระดับ Expert
            const borderColor = document.getElementById('level-select').value === 'expert' ? 'border-red-400' : 'border-blue-400';
            const numColor = document.getElementById('level-select').value === 'expert' ? 'text-red-600' : 'text-blue-600';
            
            qDiv.className = `bg-gray-50 p-6 rounded-xl mb-6 border-l-4 ${borderColor} shadow-sm`;
            
            let optionsHTML = '';
            qObj.options.forEach((opt, oIndex) => {
                optionsHTML += `
                    <label id="label-q${qIndex}-o${oIndex}" class="block p-4 mb-3 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-blue-50 transition duration-150 relative">
                        <input type="radio" name="q${qIndex}" value="${oIndex}" class="mr-3 transform scale-125 accent-blue-600" onchange="selectAnswer(${qIndex}, ${oIndex})">
                        <span class="text-lg text-gray-700 leading-relaxed">${opt}</span>
                    </label>
                `;
            });

            qDiv.innerHTML = `
                <h3 class="text-xl font-bold mb-4 text-gray-800 leading-relaxed"><span class="${numColor}">ข้อ ${qIndex + 1}:</span> ${qObj.q}</h3>
                <div class="options-container">${optionsHTML}</div>
                <div id="expl-q${qIndex}" class="explanation">
                    <strong class="text-blue-700">💡 เฉลยและเหตุผล:</strong><br>${qObj.reason}
                </div>
            `;
            container.appendChild(qDiv);
        });
    }

    function selectAnswer(qIndex, oIndex) {
        userAnswers[qIndex] = oIndex;
    }

    function submitQuiz() {
        if (userAnswers.includes(null)) {
            alert("กรุณาตอบคำถามให้ครบทุกข้อก่อนส่งคำตอบครับ 🚨");
            return;
        }

        let score = 0;

        currentQuestions.forEach((qObj, qIndex) => {
            const selected = userAnswers[qIndex];
            const correct = qObj.ans;

            const radios = document.getElementsByName(`q${qIndex}`);
            radios.forEach(radio => radio.disabled = true);

            if (selected === correct) {
                score++;
                document.getElementById(`label-q${qIndex}-o${selected}`).classList.add('correct-ans');
            } else {
                document.getElementById(`label-q${qIndex}-o${selected}`).classList.add('wrong-ans');
                document.getElementById(`label-q${qIndex}-o${correct}`).classList.add('correct-ans');
            }

            // ค่อยๆ โชว์เฉลยแบบมี Animation
            const explBox = document.getElementById(`expl-q${qIndex}`);
            explBox.style.display = 'block';
            explBox.style.animation = "fadeIn 0.5s ease-in-out";
        });

        document.getElementById('submit-btn').classList.add('hidden');
        
        const resultBox = document.getElementById('result-box');
        resultBox.classList.remove('hidden');
        document.getElementById('restart-btn').classList.remove('hidden');

        const level = document.getElementById('level-select').value;
        let msg = "";
        let bgColor = "";
        
        if (score >= 8) {
            msg = level === 'expert' ? "👑 ระดับเทพ (God Tier)! คุณคือพยาบาลตัวท็อปวิชา Microbiology!" : "🏆 ยอดเยี่ยมมาก! ความรู้แม่นยำ พร้อมลุยข้อสอบ Final แล้ว";
            bgColor = "bg-green-100 border-2 border-green-400 text-green-800";
        } else if (score >= 5) {
            msg = "👍 ทำได้ดีครับ! แต่ลองอ่านคำอธิบายในข้อที่ผิดเพื่อเสริมความเข้าใจแบบลึกซึ้งนะ";
            bgColor = "bg-yellow-100 border-2 border-yellow-400 text-yellow-800";
        } else {
            msg = level === 'expert' ? "🔥 ระดับนี้ข้อสอบปราบเซียนครับ ไม่แปลกที่จะพลาด ลองอ่านเฉลยให้เข้าใจรับรองว่าจะเก่งขึ้นแน่นอน!" : "📚 ไม่เป็นไรครับ! แนวข้อสอบนี้ค่อนข้างลึก ลองอ่านคำเฉลยรับรองว่าทำได้แน่นอน";
            bgColor = "bg-red-100 border-2 border-red-400 text-red-800";
        }

        resultBox.className = `mt-8 text-center p-6 rounded-xl text-xl font-bold ${bgColor}`;
        resultBox.innerHTML = `คุณทำคะแนนได้: ${score} / 10<br><span class="text-base font-normal mt-2 block">${msg}</span>`;
        
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>

</body>
</html>
