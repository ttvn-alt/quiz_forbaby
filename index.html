<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Micro Quiz - ระบบทดสอบจุลชีววิทยา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f4f7f6; color: #333; }
        .correct-ans { background-color: #d4edda !important; border-color: #c3e6cb !important; color: #155724; font-weight: bold; }
        .wrong-ans { background-color: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24; text-decoration: line-through; }
        .explanation { background-color: #e8f4f8; border-left: 4px solid #3498db; padding: 12px; margin-top: 10px; border-radius: 4px; font-size: 0.95rem; color: #2c3e50; display: none; line-height: 1.6; }
        input[type="radio"]:disabled { cursor: not-allowed; }
        .btn-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-blue-600 text-white p-6 text-center">
        <h1 class="text-3xl font-bold mb-2">🦠 Nursing Micro Quiz</h1>
        <p class="text-blue-100">ระบบทดสอบจุลชีววิทยา (Microbiology) สำหรับเตรียมสอบ Final</p>
    </div>

    <div id="setup-section" class="p-8">
        <div class="mb-6">
            <label class="block text-gray-700 font-bold mb-2 text-lg">📚 เลือกวิชา:</label>
            <select id="subject-select" class="w-full border-2 border-gray-200 rounded-lg p-3 text-lg focus:border-blue-500 outline-none">
                <option value="micro">Microbiology (จุลชีววิทยาประยุกต์คลินิก)</option>
            </select>
        </div>

        <div class="mb-8">
            <label class="block text-gray-700 font-bold mb-2 text-lg">⚡ เลือกระดับความยาก:</label>
            <select id="level-select" class="w-full border-2 border-gray-200 rounded-lg p-3 text-lg focus:border-blue-500 outline-none">
                <option value="easy">🟢 ระดับง่าย (Easy - ทบทวนความจำพื้นฐาน)</option>
                <option value="medium">🟡 ระดับปานกลาง (Medium - เข้าใจกลไกและกระบวนการ)</option>
                <option value="hard">🔴 ระดับยาก (Hard - ประยุกต์คลินิกเบื้องต้น)</option>
                <option value="expert" class="font-bold text-red-600">🔥 ระดับปรมาจารย์ (Expert - พยาบาลเฉพาะทาง)</option>
            </select>
        </div>

        <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-xl btn-hover shadow-lg">
            เริ่มทำแบบทดสอบ 🚀
        </button>
    </div>

    <div id="quiz-section" class="hidden p-8">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 id="quiz-title" class="text-2xl font-bold text-gray-800"></h2>
            <span id="question-count-badge" class="bg-gray-200 text-gray-700 px-4 py-1 rounded-full text-sm font-bold"></span>
        </div>

        <div id="questions-container"></div>

        <button id="submit-btn" onclick="submitQuiz()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl text-xl btn-hover shadow-lg mt-8 hidden">
            ส่งคำตอบและดูผลคะแนน ✅
        </button>

        <div id="result-box" class="mt-8 text-center p-6 rounded-xl hidden"></div>
        
        <button id="restart-btn" onclick="location.reload()" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-xl text-lg btn-hover mt-4 hidden">
            🔄 เลือกทดสอบระดับอื่น
        </button>
    </div>
</div>

<script src="question.js"></script>

<script>
    let currentQuestions = [];
    let userAnswers = [];

    function startQuiz() {
        if (typeof quizData === 'undefined') {
            // แก้ไขข้อความแจ้งเตือนให้ตรงกัน
            alert("ไม่สามารถโหลดฐานข้อมูลข้อสอบได้ กรุณาตรวจสอบไฟล์ question.js");
            return;
        }

        const level = document.getElementById('level-select').value;
        currentQuestions = quizData[level];
        userAnswers = new Array(currentQuestions.length).fill(null);

        const levelText = document.getElementById('level-select').options[document.getElementById('level-select').selectedIndex].text;
        document.getElementById('quiz-title').innerHTML = `<span class="${level === 'expert' ? 'text-red-600' : 'text-gray-800'}">${levelText}</span>`;
        document.getElementById('question-count-badge').innerText = `${currentQuestions.length} ข้อ`;

        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        document.getElementById('submit-btn').classList.remove('hidden');

        renderQuestions();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        currentQuestions.forEach((qObj, qIndex) => {
            const qDiv = document.createElement('div');
            const borderColor = document.getElementById('level-select').value === 'expert' ? 'border-red-400' : 'border-blue-400';
            const numColor = document.getElementById('level-select').value === 'expert' ? 'text-red-600' : 'text-blue-600';
            
            qDiv.className = `bg-gray-50 p-6 rounded-xl mb-6 border-l-4 ${borderColor} shadow-sm`;
            
            let optionsHTML = '';
            qObj.options.forEach((opt, oIndex) => {
                optionsHTML += `
                    <label id="label-q${qIndex}-o${oIndex}" class="block p-4 mb-3 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-blue-50 transition duration-150 relative">
                        <input type="radio" name="q${qIndex}" value="${oIndex}" class="mr-3 transform scale-125 accent-blue-600" onchange="selectAnswer(${qIndex}, ${oIndex})">
                        <span class="text-lg text-gray-700 leading-relaxed">${opt}</span>
                    </label>
                `;
            });

            qDiv.innerHTML = `
                <h3 class="text-xl font-bold mb-4 text-gray-800 leading-relaxed"><span class="${numColor}">ข้อ ${qIndex + 1}:</span> ${qObj.q}</h3>
                <div class="options-container">${optionsHTML}</div>
                <div id="expl-q${qIndex}" class="explanation">
                    <strong class="text-blue-700">💡 เฉลยและเหตุผล:</strong><br>${qObj.reason}
                </div>
            `;
            container.appendChild(qDiv);
        });
    }

    function selectAnswer(qIndex, oIndex) {
        userAnswers[qIndex] = oIndex;
    }

    function submitQuiz() {
        if (userAnswers.includes(null)) {
            alert("กรุณาตอบคำถามให้ครบทุกข้อก่อนส่งคำตอบครับ 🚨");
            return;
        }

        let score = 0;

        currentQuestions.forEach((qObj, qIndex) => {
            const selected = userAnswers[qIndex];
            const correct = qObj.ans;

            const radios = document.getElementsByName(`q${qIndex}`);
            radios.forEach(radio => radio.disabled = true);

            if (selected === correct) {
                score++;
                document.getElementById(`label-q${qIndex}-o${selected}`).classList.add('correct-ans');
            } else {
                document.getElementById(`label-q${qIndex}-o${selected}`).classList.add('wrong-ans');
                document.getElementById(`label-q${qIndex}-o${correct}`).classList.add('correct-ans');
            }

            const explBox = document.getElementById(`expl-q${qIndex}`);
            explBox.style.display = 'block';
            explBox.style.animation = "fadeIn 0.5s ease-in-out";
        });

        document.getElementById('submit-btn').classList.add('hidden');
        
        const resultBox = document.getElementById('result-box');
        resultBox.classList.remove('hidden');
        document.getElementById('restart-btn').classList.remove('hidden');

        const level = document.getElementById('level-select').value;
        const total = currentQuestions.length;
        const percentage = (score / total) * 100;
        
        let msg = "";
        let bgColor = "";
        
        if (percentage >= 80) {
            msg = level === 'expert' ? "👑 ระดับเทพ (God Tier)! คุณคือพยาบาลตัวท็อปวิชา Microbiology!" : "🏆 ยอดเยี่ยมมาก! ความรู้แม่นยำ พร้อมลุยข้อสอบ Final แล้ว";
            bgColor = "bg-green-100 border-2 border-green-400 text-green-800";
        } else if (percentage >= 50) {
            msg = "👍 ทำได้ดีครับ! แต่ลองอ่านคำอธิบายในข้อที่ผิดเพื่อเสริมความเข้าใจแบบลึกซึ้งนะ";
            bgColor = "bg-yellow-100 border-2 border-yellow-400 text-yellow-800";
        } else {
            msg = level === 'expert' ? "🔥 ระดับนี้ข้อสอบปราบเซียนครับ ไม่แปลกที่จะพลาด ลองอ่านเฉลยให้เข้าใจรับรองว่าจะเก่งขึ้นแน่นอน!" : "📚 ไม่เป็นไรครับ! แนวข้อสอบนี้ค่อนข้างลึก ลองอ่านคำเฉลยรับรองว่าทำได้แน่นอน";
            bgColor = "bg-red-100 border-2 border-red-400 text-red-800";
        }

        resultBox.className = `mt-8 text-center p-6 rounded-xl text-xl font-bold ${bgColor}`;
        resultBox.innerHTML = `คุณทำคะแนนได้: ${score} / ${total}<br><span class="text-base font-normal mt-2 block">${msg}</span>`;
        
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>

</body>
</html>
